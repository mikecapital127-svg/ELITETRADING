<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useMemo, useEffect, useRef } = React;

// ── STOCKAGE (lecture seule — charge depuis data.json ou embarqué) ──

function ls_set(k,v){}

let _EMBEDDED = window.TRADELOG_DATA || null;

function saveTrades(t){}

function saveAnnotations(trades){
  const ann={};
  trades.forEach(t=>{

// ── HELPERS ───────────────────────────────────────────────────────────
function fmtPnl(v){const abs=Math.abs(v);const s="$"+abs.toFixed(2);return(v<0?"-":"")+s;}
function normDate(d){if(!d||d==="")return"";return String(d).replace(/^(\d{4})\.(\d{2})\.(\d{2})/,"$1-$2-$3");}

const mkEmpty=(accountId="")=>({
  date:new Date().toISOString().split("T")[0],
  symbol:"",direction:"LONG",entry:"",exit:"",size:"",
  pnl:"",rr:"",emotion:"",strategy:"",session:"",
  notes:"",mistakes:"",tags:[],screenshots:[],accountId
});

// ── COMPOSANTS ───────────────────────────────────────────────────────
function Gauge({value,max,color,size=52}){
  const pct=Math.min(value/max,1);
  const r=size*0.38,cx=size/2,cy=size/2;
  const sa=-Math.PI*0.75,ea=Math.PI*0.75;
  const aa=sa+pct*(ea-sa);
  const x1=cx+r*Math.cos(sa),y1=cy+r*Math.sin(sa);
  const x2=cx+r*Math.cos(ea),y2=cy+r*Math.sin(ea);
  const vx=cx+r*Math.cos(aa),vy=cy+r*Math.sin(aa);
  const bgArc=`M ${x1} ${y1} A ${r} ${r} 0 1 1 ${x2} ${y2}`;
  const fgArc=`M ${x1} ${y1} A ${r} ${r} 0 ${pct>(1/1.5)?1:0} 1 ${vx} ${vy}`;
  return <svg width={size} height={size} style={{display:"block"}}>
    <path d={bgArc} fill="none" stroke="rgba(0,180,255,0.15)" strokeWidth={4} strokeLinecap="round"/>
    {pct>0&&<path d={fgArc} fill="none" stroke={color} strokeWidth={4} strokeLinecap="round"/>}
  </svg>;
}

// ── ÉCRAN DE BIENVENUE ────────────────────────────────────────────────

// ── FORMULAIRE TRADE INLINE ────────────────────────────────────────────
function TradeForm({initial,onSave,onCancel,title}){

    <div style={{background:"#04080f",border:"1px solid #00ff88",borderRadius:12,padding:20,marginBottom:8}}>
      {title&&<div style={{fontSize:13,fontWeight:700,color:"#00ff88",marginBottom:16}}>{title}</div>}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:10,marginBottom:12}}>
        <div>
          <label className="lbl">Symbole *</label>
          <input className="inp" value={f.symbol} onChange={e=>set("symbol")(e.target.value.toUpperCase())} placeholder="EURUSD"/>
        </div>
        <div>
          <label className="lbl">Direction</label>
          <select className="inp" value={f.direction} onChange={e=>set("direction")(e.target.value)} style={{cursor:"pointer"}}>

          <input className="inp" type="number" step="0.01" value={f.pnl} onChange={e=>set("pnl")(e.target.value)} placeholder="0.00"/>
        </div>
        <div>
          <label className="lbl">R:R</label>
          <input className="inp" type="number" step="0.1" value={f.rr} onChange={e=>set("rr")(e.target.value)} placeholder="0.0"/>
        </div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:10,marginBottom:12}}>
        <div>
          <label className="lbl">Entrée</label>
          <input className="inp" type="number" step="any" value={f.entry} onChange={e=>set("entry")(e.target.value)}/>
        </div>
        <div>
          <label className="lbl">Sortie</label>

// ── ROOT — version publique : fetch data.json auto-refresh ──────────
function App(){
  const [accounts,setAccountsRaw]=useState(loadAccounts);
  const [loading,setLoading]=useState(!_EMBEDDED);
  const [lastUpdate,setLastUpdate]=useState(null);
  const [error,setError]=useState(null);

  function setAccounts(fn){
    setAccountsRaw(prev=>{
      const next=typeof fn==="function"?fn(prev):fn;
      return next;
    });
  }

  // Fetch data.json (au chargement + toutes les 60s)
  function fetchData(){
    fetch("data.json?t="+Date.now())
      .then(r=>{if(!r.ok)throw new Error("HTTP "+r.status);return r.json();})
      .then(data=>{
        _EMBEDDED=data;
        setAccountsRaw(data.accounts||[]);
        setLastUpdate(data.exported_at||new Date().toLocaleString("fr-FR"));
        setLoading(false);
        setError(null);
      })
      .catch(e=>{
        // Si data.json n'existe pas, garder les données embarquées
        if(_EMBEDDED){setLoading(false);return;}
        setError(e.message);
        setLoading(false);
      });
  }

  useEffect(()=>{
    if(!_EMBEDDED){
      fetchData();
      const t=setInterval(fetchData,60000);
      return()=>clearInterval(t);
    }
  },[]);

  if(loading){
    return(
      <div style={{minHeight:"100vh",background:"#04080f",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:12}}>
        <div style={{fontFamily:"'Space Mono',monospace",fontWeight:700,fontSize:22,color:"#00ff88"}}>◈ TradeLog</div>
        <div style={{color:"#8b8e99",fontSize:13}}>Chargement des données...</div>
      </div>
    );
  }

  if(accounts.length===0&&error){
    return(
      <div style={{minHeight:"100vh",background:"#04080f",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:12}}>
        <div style={{fontFamily:"'Space Mono',monospace",fontWeight:700,fontSize:22,color:"#00ff88"}}>◈ TradeLog</div>
        <div style={{color:"#8b8e99",fontSize:13}}>Aucune donnée disponible.</div>
      </div>
    );
  }

  return <AppMain accounts={accounts} setAccounts={setAccounts} initialAccountId={null} lastUpdate={lastUpdate}/>;
}

// ── APP PRINCIPALE ─────────────────────────────────────────────────────
function AppMain({accounts,setAccounts,initialAccountId,lastUpdate}){
  const [trades,setTradesRaw]   = useState(loadTrades);
  const [withdrawals,setWithdrawalsRaw] = useState(loadWithdrawals);

  // Re-sync trades/withdrawals quand _EMBEDDED change (auto-refresh)
  useEffect(()=>{
    if(_EMBEDDED){
      setTradesRaw(_EMBEDDED.trades||[]);
      setWithdrawalsRaw(_EMBEDDED.withdrawals||{});
    }
  },[lastUpdate]);
  const [view,setView]          = useState("dashboard");
  const [calMonth,setCalMonth]  = useState(()=>({year:new Date().getFullYear(),month:new Date().getMonth()}));
  const [calSelected,setCalSelected]=useState(null);
  const [calAccount,setCalAccount]=useState(()=>initialAccountId||"all");
  const [mt5Status,setMt5Status]=useState("");
  const [lightbox,setLightbox]  = useState(null);

  // Gestion compte sidebar
  const [showAddAccount,setShowAddAccount]=useState(false);
  const [newAccName,setNewAccName]=useState("");
  const [newAccLogin,setNewAccLogin]=useState("");
  const [renamingId,setRenamingId]=useState(null);
  const [renameVal,setRenameVal]=useState("");

  // Formulaire trade inline
  const [editTradeId,setEditTradeId]=useState(null); // id du trade en édition
  const [addingForDate,setAddingForDate]=useState(null); // date pour nouveau trade
  const [editForm,setEditForm]=useState(null);
  const [newForm,setNewForm]=useState(null);

  // ── LECTURE SEULE (version publique — pas d'écriture localStorage) ──
  function setTrades(fn){
    setTradesRaw(prev=>{
      const next=typeof fn==="function"?fn(prev):fn;
      return next;
    });
  }
  function setWithdrawals(fn){
    setWithdrawalsRaw(prev=>{
      const next=typeof fn==="function"?fn(prev):fn;
      return next;
    });
  }

  // ── MERGE TRADES MT5 ─────────────────────────────────────────────
  function mergeMT5Trades(raw,accountId,accountName,data){
    if(!raw.length){setMt5Status("⚠️ Fichier vide — compte "+accountId);return;}
    setMt5Status("✅ "+raw.length+" trades chargés ("+accountName+")");
    setTimeout(()=>setMt5Status(""),5000);
    // Mettre à jour ou créer le compte (balance rafraîchie à chaque poll)
    setAccounts(prev=>{
      const existing=prev.find(a=>a.id===accountId);
      const newBalance=data&&data.balance!=null?data.balance:null;
      if(existing){
        // Mettre à jour la balance MT5 sans écraser le nom ni le capital
        return prev.map(a=>a.id===accountId?{...a,balance:newBalance}:a);
      }
      return [...prev,{id:accountId,name:accountName,balance:newBalance}];
    });
    setTrades(prev=>{
      const anns=loadAnnotations();
      const existMap={};
      prev.forEach(t=>{if(t.mt5_position_id)existMap[String(t.mt5_position_id)]=t;});
      const kept=prev.filter(t=>!(t.source==="MT5"&&t.accountId===accountId));
      raw.forEach((t,i)=>{
        const posId=String(t.mt5_position_id||t.id||"");
        const saved=existMap[posId]||{};
        const ann=anns[posId]||{};
        const base=Object.keys(saved).length?saved:ann;
        const nc=normDate(t.close_time||"");
        const nd=normDate(t.date||"");
        const fd=(nc&&nc!=="")?nc.split(" ")[0]:nd||new Date().toISOString().split("T")[0];
        const pnlVal=t.pnl!=null&&t.pnl!==""?parseFloat(t.pnl):(t.profit!=null?parseFloat(t.profit):0);
        kept.push({
          id:t.mt5_position_id||(Date.now()+i),
          mt5_position_id:t.mt5_position_id||null,
          date:fd,close_time:nc,
          symbol:t.symbol||"",direction:t.direction||"LONG",
          entry:t.entry!=null?Number(t.entry):0,
          exit:t.exit!=null?Number(t.exit):0,
          size:Number(t.size||t.volume)||0,
          pnl:isNaN(pnlVal)?0:pnlVal,
          rr:Number(t.rr)||0,
          session:base.session||t.session||"",
          strategy:base.strategy||t.strategy||"",
          emotion:base.emotion||t.emotion||"",
          notes:base.notes||t.notes||"",
          mistakes:base.mistakes||t.mistakes||"",
          tags:base.tags||t.tags||[],
          screenshots:base.screenshots||t.screenshots||[],
          source:"MT5",status:t.status||"CLOSED",accountId,
        });
      });
      return kept;
    });
  }

  // ── FETCH MT5 JSON ───────────────────────────────────────────────
  function fetchMT5Login(login){
    const accountId="mt5_"+login;
    fetch("mt5_trades_"+login+".json?t="+Date.now())
      .then(r=>{if(!r.ok)throw new Error("HTTP "+r.status);return r.json();})
      .then(data=>{
        const raw=Array.isArray(data)?data:(data.trades||[]);
        const name=data.account_name||("Compte "+login);
        mergeMT5Trades(raw,accountId,name,data);
      })
      .catch(e=>{
        console.warn("[TradeLog] Fetch mt5_trades_"+login+".json échoué:",e.message);
      });
  }

  // ── POLLING AUTO (désactivé si données embarquées) ─────────────────
  useEffect(()=>{
    if(_EMBEDDED) return; // Données embarquées — pas de polling
    function pollAll(){
      const logins=ls_get("tradelog_mt5_logins",[]);
      logins.forEach(l=>fetchMT5Login(String(l)));
    }
    pollAll();
    const t=setInterval(pollAll,10000);
    return()=>clearInterval(t);
  },[]);

  // Lance le fetch MT5 si on vient de créer le premier compte depuis Welcome
  useEffect(()=>{
    if(_EMBEDDED) return;
    if(initialAccountId&&initialAccountId.startsWith("mt5_")){
      const login=initialAccountId.replace("mt5_","");
      fetchMT5Login(login);
    }
  },[initialAccountId]);

  // ── AJOUTER UN COMPTE ────────────────────────────────────────────
  function addAccount(name,login,initialCapital){
    const id=login?"mt5_"+login:"acc_"+Date.now();
    if(accounts.find(a=>a.id===id))return;
    setAccounts(prev=>[...prev,{id,name,initialCapital:initialCapital||0}]);
    if(login){
      const logins=ls_get("tradelog_mt5_logins",[]);
      if(!logins.includes(login)){ls_set("tradelog_mt5_logins",[...logins,login]);}
      fetchMT5Login(login);
    }
    setCalAccount(id);
    setNewAccName("");setNewAccLogin("");setShowAddAccount(false);
  }

  function deleteAccount(id){
    setAccounts(prev=>prev.filter(a=>a.id!==id));
    if(id.startsWith("mt5_")){
      const login=id.replace("mt5_","");
      const logins=ls_get("tradelog_mt5_logins",[]).filter(l=>String(l)!==String(login));
      ls_set("tradelog_mt5_logins",logins);
    }
    setTrades(prev=>prev.filter(t=>(t.accountId||"")!==id));
    if(calAccount===id)setCalAccount("all");
  }

  function renameAccount(id){
    const name=renameVal.trim();
    if(!name)return;
    setAccounts(prev=>prev.map(a=>a.id===id?{...a,name}:a));
    setRenamingId(null);setRenameVal("");
  }

  // ── STATS ────────────────────────────────────────────────────────
  const todayStr=new Date().toLocaleDateString("en-CA");

  // Trades filtrés pour le compte sélectionné
  const accountTrades=useMemo(()=>
    calAccount==="all"?trades:trades.filter(t=>(t.accountId||"")===calAccount),
  [trades,calAccount]);

  const dashStats=useMemo(()=>{
    const closed=accountTrades.filter(t=>t.status!=="OPEN");
    const open  =accountTrades.filter(t=>t.status==="OPEN");
    const wins  =closed.filter(t=>Number(t.pnl)>0);
    const losses=closed.filter(t=>Number(t.pnl)<0);
    const totalPnl=closed.reduce((s,t)=>s+Number(t.pnl),0);
    const openPnl =open.reduce((s,t)=>s+Number(t.pnl),0);
    const winRate =closed.length?wins.length/closed.length*100:0;
    const avgWin  =wins.length?wins.reduce((s,t)=>s+Number(t.pnl),0)/wins.length:0;
    const avgLoss =losses.length?Math.abs(losses.reduce((s,t)=>s+Number(t.pnl),0)/losses.length):0;
    const profitFactor=avgLoss>0?(avgWin*wins.length)/(avgLoss*losses.length):0;

    const dayMap={};
    closed.forEach(t=>{
      const dk=(t.close_time&&t.close_time!=="")?t.close_time.split(" ")[0]:t.date;
      if(!dk)return;
      if(!dayMap[dk]){dayMap[dk]={pnl:0,count:0,wins:0};}
      dayMap[dk].pnl+=Number(t.pnl);dayMap[dk].count++;
      if(Number(t.pnl)>0)dayMap[dk].wins++;
    });
    const dayEntries=Object.entries(dayMap).sort(([a],[b])=>a.localeCompare(b));
    const winDays=dayEntries.filter(([,d])=>d.pnl>0).length;
    const dayWinRate=dayEntries.length?winDays/dayEntries.length*100:0;

    let cumul=0,peak=0,maxDD=0;
    const cumulData=dayEntries.map(([date,d])=>{cumul+=d.pnl;return{date,cumul,daily:d.pnl};});
    cumulData.forEach(p=>{if(p.cumul>peak)peak=p.cumul;const dd=peak>0?(p.cumul-peak)/peak*100:0;if(dd<maxDD)maxDD=dd;});

    const monthlyMap={};
    closed.forEach(t=>{
      const dk=(t.close_time&&t.close_time!=="")?t.close_time.split(" ")[0]:t.date;
      if(!dk)return;
      const ym=dk.slice(0,7);
      if(!monthlyMap[ym])monthlyMap[ym]=0;
      monthlyMap[ym]+=Number(t.pnl);
    });
    const monthlyEntries=Object.entries(monthlyMap).sort(([a],[b])=>a.localeCompare(b));

    return{closed,open,wins,losses,totalPnl,openPnl,winRate,avgWin,avgLoss,profitFactor,dayEntries,winDays,dayWinRate,cumulData,maxDD,monthlyEntries};
  },[accountTrades]);

  // ── CALENDRIER DATA ───────────────────────────────────────────────
  const calData=useMemo(()=>{
    const{year,month}=calMonth;
    const dayMap={};
    accountTrades.filter(t=>t.status!=="OPEN").forEach(t=>{
      const dk=(t.close_time&&t.close_time!=="")?t.close_time.split(" ")[0]:t.date;
      if(!dk)return;
      const p=dk.split("-");
      if(parseInt(p[0])===year&&parseInt(p[1])-1===month){
        if(!dayMap[dk])dayMap[dk]={pnl:0,count:0,wins:0,trades:[]};
        const tp=parseFloat(t.pnl)||0;
        dayMap[dk].pnl+=tp;dayMap[dk].count++;
        if(tp>0)dayMap[dk].wins++;
        dayMap[dk].trades.push({...t,pnl:tp});
      }
    });
    const daysInMonth=new Date(year,month+1,0).getDate();
    const firstDayRaw=new Date(year,month,1).getDay();
    const firstDay=firstDayRaw===0?6:firstDayRaw-1;
    const cells=[];
    for(let i=0;i<firstDay;i++)cells.push(null);
    for(let d=1;d<=daysInMonth;d++){
      const ds=year+"-"+String(month+1).padStart(2,"0")+"-"+String(d).padStart(2,"0");
      cells.push({d,dateStr:ds,data:dayMap[ds]||null});
    }
    while(cells.length%7!==0)cells.push(null);
    const weeks=[];for(let i=0;i<cells.length;i+=7)weeks.push(cells.slice(i,i+7));
    const monthPnl=Object.values(dayMap).reduce((s,d)=>s+d.pnl,0);
    const weekSummaries=weeks.map((wk,wi)=>{
      const days=wk.filter(Boolean).filter(c=>c.data);
      return{pnl:days.reduce((s,c)=>s+c.data.pnl,0),tradeDays:days.length,weekNum:wi+1};
    });
    return{weeks,weekSummaries,monthPnl,tradingDays:Object.keys(dayMap).length,dayMap};
  },[accountTrades,calMonth]);

  // ── HEAT MAP ─────────────────────────────────────────────────────
  const heatWeeks=useMemo(()=>{
    const{dayMap}=calData;
    const allDayMap={};
    accountTrades.filter(t=>t.status!=="OPEN").forEach(t=>{
      const dk=(t.close_time&&t.close_time!=="")?t.close_time.split(" ")[0]:t.date;
      if(!dk)return;
      if(!allDayMap[dk]){allDayMap[dk]={pnl:0,count:0};}
      allDayMap[dk].pnl+=Number(t.pnl);allDayMap[dk].count++;
    });
    const today=new Date();const weeks=[];
    for(let w=9;w>=0;w--){
      const week=[];
      // Monday=0 ... Sunday=6
      for(let d=0;d<7;d++){
        const dt=new Date(today);
        const dayOffset=today.getDay()===0?6:today.getDay()-1; // Mon offset
        dt.setDate(today.getDate()-dayOffset-w*7+d);
        const ds=dt.toLocaleDateString("en-CA");
        week.push({date:ds,data:allDayMap[ds]||null});
      }
      weeks.push(week);
    }
    return weeks;
  },[accountTrades]);

  // ── GRAPHIQUES ────────────────────────────────────────────────────
  const CW=300,CH=100;
  function pp(pts){if(!pts.length)return"";return"M "+pts.map(p=>p.join(" ")).join(" L ");}
  function pa(pts,h){if(!pts.length)return"";return pp(pts)+" L "+pts[pts.length-1][0]+" "+h+" L "+pts[0][0]+" "+h+" Z";}

  const{cumulData,dayEntries,totalPnl,maxDD,monthlyEntries}=dashStats;

  // ── CAPITAL & RETRAITS ────────────────────────────────────────────
  const [showCapitalModal,setShowCapitalModal]=useState(false);
  const [wdAmount,setWdAmount]=useState("");
  const [wdDate,setWdDate]=useState(()=>new Date().toISOString().split("T")[0]);
  const [wdNote,setWdNote]=useState("");

  const currentAccount=accounts.find(a=>a.id===calAccount);
  const initialCapital=calAccount==="all"
    ? accounts.reduce((s,a)=>s+(a.initialCapital||0),0)
    : (currentAccount?.initialCapital||0);

  const accountWithdrawals=useMemo(()=>{
    if(calAccount==="all"){
      const all=[];
      Object.values(withdrawals).forEach(arr=>{if(Array.isArray(arr))arr.forEach(w=>all.push(w));});
      return all.sort((a,b)=>a.date.localeCompare(b.date));
    }
    return (withdrawals[calAccount]||[]).sort((a,b)=>a.date.localeCompare(b.date));
  },[withdrawals,calAccount]);

  const totalWithdrawn=accountWithdrawals.reduce((s,w)=>s+Number(w.amount),0);
  const currentCapital=initialCapital+dashStats.totalPnl-totalWithdrawn;
  const totalGainPct=initialCapital>0?((currentCapital-initialCapital)/initialCapital)*100:0;
  const netGainAfterWd=dashStats.totalPnl-totalWithdrawn;

  // Retraits par mois
  const wdByMonth={};
  accountWithdrawals.forEach(w=>{
    const ym=w.date.slice(0,7);
    if(!wdByMonth[ym])wdByMonth[ym]=0;
    wdByMonth[ym]+=Number(w.amount);
  });

  function addWithdrawal(){
    const amt=parseFloat(wdAmount);
    if(!amt||amt<=0)return;
    const accId=calAccount==="all"?(accounts[0]?.id||"acc_default"):calAccount;
    const entry={id:Date.now(),date:wdDate,amount:amt,note:wdNote.trim()};
    setWithdrawals(prev=>({...prev,[accId]:[...(prev[accId]||[]),entry]}));
    setWdAmount("");setWdNote("");setShowCapitalModal(false);
  }
  function deleteWithdrawal(accId,wid){
    setWithdrawals(prev=>({...prev,[accId]:(prev[accId]||[]).filter(w=>w.id!==wid)}));
  }
  const cMin=Math.min(...cumulData.map(d=>d.cumul),0);
  const cMax=Math.max(...cumulData.map(d=>d.cumul),1);
  const cRange=cMax-cMin||1;
  const cPts=cumulData.map((d,i)=>[(i/Math.max(cumulData.length-1,1))*CW,CH-((d.cumul-cMin)/cRange)*CH]);
  const dMax=Math.max(...dayEntries.map(([,d])=>Math.abs(d.pnl)),1);

  // Radar Score
  const{winRate,avgWin,avgLoss,profitFactor}=dashStats;
  const consistency=Math.min(100,winRate);
  const pfScore=Math.min(100,profitFactor*33);
  const wlScore=avgLoss>0?Math.min(100,(avgWin/avgLoss)*50):50;
  const ddScore=Math.max(0,100+maxDD*2);
  const recScore=dashStats.losses.length>0?Math.min(100,(dashStats.wins.length/(dashStats.losses.length+dashStats.wins.length))*100):100;
  const zellaScore=Math.round((consistency+pfScore+wlScore+ddScore+recScore)/5);
  const RC=70,RR=52;
  const radarAxes=[
    {label:"Win %",val:consistency/100},{label:"P.Factor",val:pfScore/100},
    {label:"Avg W/L",val:wlScore/100},{label:"Drawdown",val:ddScore/100},
    {label:"Recovery",val:recScore/100},{label:"Consist.",val:Math.min(1,trades.length/20)},
  ];
  function rPt(i,r){const a=(i/radarAxes.length)*Math.PI*2-Math.PI/2;return[RC+Math.cos(a)*r,RC+Math.sin(a)*r];}
  const vPts=radarAxes.map((a,i)=>rPt(i,RR*a.val));
  const poly=vPts.map(p=>p.join(",")).join(" ");

  // Camembert paires
  const pairMap={};
  dashStats.closed.forEach(t=>{const s=t.symbol||"?";if(!pairMap[s])pairMap[s]={count:0,pnl:0};pairMap[s].count++;pairMap[s].pnl+=Number(t.pnl);});
  const pairList=Object.entries(pairMap).sort(([,a],[,b])=>b.count-a.count);
  const PIE_C=["#00ff88","#60a5fa","#f472b6","#ffaa00","#818cf8","#34d399","#fb923c","#e879f9","#38bdf8","#facc15","#ef5350","#818cf8"];
  function PieChart({sz=140}){
    if(!pairList.length)return<div style={{width:sz,height:sz,borderRadius:"50%",background:"#0d1220",display:"flex",alignItems:"center",justifyContent:"center"}}><span style={{color:"rgba(0,200,255,0.35)",fontSize:11}}>Aucun</span></div>;
    const tot=pairList.reduce((s,[,d])=>s+d.count,0);
    let ang=0;
    const slices=pairList.map(([sym,d],i)=>{
      const pct=d.count/tot;const s=ang*2*Math.PI-Math.PI/2;const e=(ang+pct)*2*Math.PI-Math.PI/2;
      const r=sz/2-3,cx=sz/2,cy=sz/2;
      const x1=cx+r*Math.cos(s),y1=cy+r*Math.sin(s),x2=cx+r*Math.cos(e),y2=cy+r*Math.sin(e);
      const large=pct>0.5?1:0;
      const path=pct>=0.999?`M ${cx-r} ${cy} a ${r} ${r} 0 1 1 ${r*2} 0 a ${r} ${r} 0 1 1 -${r*2} 0`:`M ${cx} ${cy} L ${x1} ${y1} A ${r} ${r} 0 ${large} 1 ${x2} ${y2} Z`;
      ang+=pct;
      return{path,color:PIE_C[i%PIE_C.length]};
    });
    return<svg width={sz} height={sz}><circle cx={sz/2} cy={sz/2} r={sz/2-3} fill="#04080f"/>{slices.map((s,i)=><path key={i} d={s.path} fill={s.color} opacity={0.85} stroke="#0a0e1a" strokeWidth={1.5}/>)}<circle cx={sz/2} cy={sz/2} r={sz/4} fill="#0a0e1a"/></svg>;
  }

  const card=ch=><div className="card">{ch}</div>;
  const lbl=t=><div className="lbl">{t}</div>;

  // ── COMPOSANT formulaire ajout compte (hooks valides hors render) ──
  function AddAccountForm(){
    const [ct,setCt]=useState("mt5");
    const [nn,setNn]=useState("");
    const [nl,setNl]=useState("");
    const [nc,setNc]=useState("");
    const [er,setEr]=useState("");
    const CTABS=[["mt5","📡 MT5 Auto"],["manual","✏️ Manuel"]];
    function doAdd(){
      if(!nn.trim()){setEr("Nom requis");return;}
      if(ct==="mt5"&&!nl.trim()){setEr("N° MT5 requis");return;}
      addAccount(nn.trim(),ct==="mt5"?nl.trim():"",parseFloat(nc)||0);
      setNn("");setNl("");setNc("");setEr("");
    }
    return(
      <div style={{background:"#04080f",border:"1px solid #1e1e1e",borderRadius:16,overflow:"hidden"}}>
        <div style={{background:"#04080f",borderBottom:"1px solid #1a1a1a",display:"flex",alignItems:"center",height:48}}>
          <div style={{padding:"0 20px",fontFamily:"'Space Mono',monospace",fontSize:12,fontWeight:700,color:"rgba(0,200,255,0.35)",borderRight:"1px solid #1a1a1a",height:"100%",display:"flex",alignItems:"center",whiteSpace:"nowrap"}}>
            + Ajouter compte
          </div>
          <div style={{display:"flex",alignItems:"center",gap:2,padding:"0 10px",height:"100%"}}>
            {CTABS.map(([k,l])=>(
              <button key={k} onClick={()=>{setCt(k);setEr("");}}
                style={{background:ct===k?"#0d1220":"transparent",border:"none",borderBottom:ct===k?"2px solid #00ff88":"2px solid transparent",borderRadius:0,color:ct===k?"#00ff88":"#434651",padding:"0 12px",height:"100%",fontSize:12,cursor:"pointer",fontWeight:ct===k?700:400,fontFamily:"inherit",whiteSpace:"nowrap"}}>
                {l}
              </button>
            ))}
          </div>
        </div>
        <div style={{padding:"20px 22px"}}>
          {ct==="mt5"&&<div style={{fontSize:11,color:"rgba(0,200,255,0.35)",marginBottom:14,lineHeight:1.6,background:"#0a0e1a",border:"1px solid #1a1a1a",borderRadius:7,padding:"9px 12px"}}>
            Place <span style={{color:"#00ff88",fontFamily:"monospace",fontSize:10}}>TradeLogExport.mq5</span> dans MT5 puis sync auto via JSON.
          </div>}
          <div style={{marginBottom:12}}>
            <label className="lbl">Nom du compte</label>
            <input className="inp" value={nn} onChange={e=>setNn(e.target.value)} placeholder={ct==="mt5"?"Ex: Funded ICT":"Ex: Perso"} onKeyDown={e=>e.key==="Enter"&&doAdd()}/>
          </div>
          {ct==="mt5"&&<div style={{marginBottom:12}}>
            <label className="lbl">N° compte MT5</label>
            <input className="inp" value={nl} onChange={e=>setNl(e.target.value.replace(/\D/g,""))} placeholder="Ex: 5044479" onKeyDown={e=>e.key==="Enter"&&doAdd()}/>
          </div>}

        ══════════════════════════════════════════════════════════ */}

                    <div>
                      <div style={{fontSize:9,color:"#8b8e99",letterSpacing:"0.12em",textTransform:"uppercase",marginBottom:5,fontWeight:700}}>Note</div>

                    </div>

                      return allMonths.map((ym,idx)=>{
                        const mPnl=monthlyEntries.find(([m])=>m===ym)?.[1]||0;
                        const mWd=wdByMonth[ym]||0;
                        const mNet=mPnl-mWd;
                        const prev=rc; rc+=mNet;
                        const mPct=prev>0?(mNet/prev)*100:0;
                        const mPnlPct=prev>0?(mPnl/prev)*100:0;
                        const mWdPct=initialCapital>0?(mWd/initialCapital)*100:0;
                        const [yr,mo]=ym.split("-");
                        return(
                          <div key={ym} style={{display:"grid",gridTemplateColumns:"110px 1fr 1fr 1fr 1fr",padding:"8px 14px",borderBottom:idx<allMonths.length-1?"1px solid #0d1220":"none",background:idx%2===0?"#04080f":"#0a0e1a",alignItems:"center"}}>

                              {initialCapital>0&&<div style={{fontSize:9,color:mPnl>=0?"#00ff8880":"#ef535080",marginTop:1}}>{mPnlPct>=0?"+":""}{mPnlPct.toFixed(2)}%</div>}

                            <div>
                              <div style={{fontFamily:"'Space Mono',monospace",fontSize:11,fontWeight:700,color:mNet>=0?"#00cfff":"#ef5350"}}>{mNet>=0?"+":""}{mNet.toFixed(2)}$</div>

                            <div style={{display:"flex",alignItems:"center",gap:5}}>

                              <div style={{flex:1,height:3,background:"#0d1220",borderRadius:2,overflow:"hidden",maxWidth:40}}>
                                <div style={{height:"100%",background:mPct>=0?"#00ff88":"#ef5350",width:Math.min(Math.abs(mPct),100)+"%"}}/>

                            <div>
                              {mWd>0

                                : <div style={{fontFamily:"monospace",fontSize:11,color:"rgba(0,180,255,0.15)"}}>—</div>
                              }
                            </div>
                          </div>
                        );
                      });
                    })()}
                    <div style={{display:"grid",gridTemplateColumns:"110px 1fr 1fr 1fr 1fr",padding:"9px 14px",background:"#0a0e1a",borderTop:"1px solid #00ff8830"}}>

                      <div>
                        <div style={{fontFamily:"'Space Mono',monospace",fontSize:12,fontWeight:700,color:dashStats.totalPnl>=0?"#00ff88":"#ef5350"}}>{dashStats.totalPnl>=0?"+":""}{dashStats.totalPnl.toFixed(2)}$</div>
                        {initialCapital>0&&<div style={{fontSize:9,color:dashStats.totalPnl>=0?"#00ff8880":"#ef535080",marginTop:1}}>{initialCapital>0?(dashStats.totalPnl>=0?"+":"")+(dashStats.totalPnl/initialCapital*100).toFixed(2)+"%":"—"}</div>}
                      </div>
                      <div style={{fontFamily:"'Space Mono',monospace",fontSize:12,fontWeight:700,color:netGainAfterWd>=0?"#00cfff":"#ef5350"}}>{netGainAfterWd>=0?"+":""}{netGainAfterWd.toFixed(2)}$</div>

                      <div>
                        {totalWithdrawn>0&&<><div style={{fontFamily:"'Space Mono',monospace",fontSize:12,fontWeight:700,color:"#ffaa00"}}>-{totalWithdrawn.toFixed(2)}$</div>

                    {wWd>0&&<>
                      <div style={{height:"1px",background:"rgba(255,170,0,0.2)",margin:"6px 0"}}/>
                      <div style={{fontSize:9,color:"rgba(255,170,0,0.6)",fontWeight:700,letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:2}}>Retrait</div>
                      <div style={{fontFamily:"'Space Mono',monospace",fontSize:12,fontWeight:700,color:"#ffaa00"}}>-${wWd.toFixed(0)}$</div>
                      {initialCapital>0&&<div style={{fontSize:9,color:"rgba(255,170,0,0.5)",marginTop:1}}>-{wWdPct.toFixed(2)}%</div>}
                    </>}
                    {wWd===0&&ws.tradeDays===0&&<div style={{fontSize:9,color:"rgba(0,180,255,0.25)"}}>—</div>}
                  </div>);})}
              </div>
            </div>
            {/* ── BARRE STATS MENSUELLE ── */}
            <div className="stats-bar" style={{background:"#0a0e1a",border:"1px solid #1e1e1e",borderTop:"none",borderRadius:"0 0 12px 12px",padding:"10px 20px",display:"grid",gridTemplateColumns:"repeat(8,1fr)"}}>
              {[
                {lbl:"P&L Mois",val:(calData.monthPnl>=0?"+":"")+calData.monthPnl.toFixed(2)+"$",c:calData.monthPnl>=0?"#00ff88":"#ef5350"},
                {lbl:"Jours tradés",val:calData.tradingDays+" j",c:"#d1d4dc"},
                {lbl:"Jours vert",val:monthWins+" j",c:"#00ff88"},
                {lbl:"Jours rouge",val:monthLosses+" j",c:"#ef5350"},
                {lbl:"Win rate",val:monthWR+"%",c:monthWR>=50?"#00ff88":"#ef5350"},
                {lbl:"Nb trades",val:monthTradeCount+" trades",c:"#d1d4dc"},
                {lbl:"Moy gain/j",val:monthAvgWin>0?"+$"+monthAvgWin.toFixed(0):"—",c:"#00ff88"},
                {lbl:"Retraits mois",val:monthWdTotal>0?"-$"+monthWdTotal.toFixed(0)+(initialCapital>0?" · "+(monthWdTotal/initialCapital*100).toFixed(1)+"%":""):"—",c:monthWdTotal>0?"#ffaa00":"#434651"},
              ].map((s,i)=>(
                <div key={i} className="stats-bar-item" style={{textAlign:"center",padding:"4px 8px",borderRight:i<7?"1px solid rgba(0,180,255,0.08)":"none"}}>
                  <div style={{fontSize:8,color:"#a8aab4",letterSpacing:"0.1em",textTransform:"uppercase",fontWeight:700,marginBottom:4}}>{s.lbl}</div>
                  <div style={{fontFamily:"'Space Mono',monospace",fontSize:11,fontWeight:700,color:s.c}}>{s.val}</div>
                </div>
              ))}
            </div>
            </div>{/* /cal-inner-wrap */}
            </div>{/* /cal-scroll-wrap */}
            </div>);})()}

            {/* Détail du jour sélectionné */}
            {calSelected&&(
              <div className="day-detail" style={{marginTop:16,background:"#0a0e1a",border:"1px solid #1e1e1e",borderRadius:12,padding:"20px 24px"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:16}}>
                  <div>
                    <div style={{fontSize:13,color:"#a8aab4",marginBottom:4}}>{new Date(calSelected+"T12:00:00").toLocaleDateString("fr-FR",{weekday:"long",day:"numeric",month:"long",year:"numeric"})}</div>
                    {calData.dayMap[calSelected]&&(
                      <div>
                        <div style={{fontSize:26,fontWeight:800,fontFamily:"monospace",color:calData.dayMap[calSelected].pnl>=0?"#00ff88":"#ef5350"}}>{calData.dayMap[calSelected].pnl>=0?"+":""}${calData.dayMap[calSelected].pnl.toFixed(2)}</div>
                        <div style={{fontSize:13,color:"#a8aab4",marginTop:4}}>{calData.dayMap[calSelected].count} trade{calData.dayMap[calSelected].count>1?"s":""} · {Math.round(calData.dayMap[calSelected].wins/calData.dayMap[calSelected].count*100)}% win</div>
                      </div>
                    )}
                  </div>
                  <div style={{display:"flex",gap:8}}>
                    <button className="btn-ghost" onClick={()=>{setCalSelected(null);}}>✕</button>
                  </div>
                </div>

                {/* Liste des trades du jour (lecture seule) */}
                <div style={{display:"flex",flexDirection:"column",gap:8}}>
                  {(calData.dayMap[calSelected]?.trades||[]).map(t=>(
                    <div key={t.id}>
                        <div style={{background:"#04080f",border:"1px solid "+(t.pnl>=0?"#1e3a28":"#3a1e1e"),borderRadius:10,padding:"14px 16px"}}>
                          <div>
                            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:4}}>
                              <span style={{fontWeight:700,fontSize:15}}>{t.symbol}</span>
                              <span style={{background:t.direction==="LONG"?"#0d1f1a":"#1f0d0e",color:t.direction==="LONG"?"#00ff88":"#ef5350",borderRadius:4,padding:"2px 7px",fontSize:11,fontWeight:700}}>{t.direction}</span>
                              {t.status==="OPEN"&&<span style={{background:Number(t.pnl)>=0?"#0d1f1a":"#1f0d0e",color:Number(t.pnl)>=0?"#00ff88":"#ef5350",borderRadius:4,padding:"2px 7px",fontSize:10,fontWeight:700}}>OPEN</span>}
                              <span style={{fontFamily:"monospace",fontWeight:700,fontSize:14,color:t.pnl>=0?"#00ff88":"#ef5350",marginLeft:"auto"}}>{t.pnl>=0?"+":""}${Number(t.pnl).toFixed(2)}</span>
                            </div>
                            <div style={{fontSize:12,color:"#a8aab4",display:"flex",gap:12,flexWrap:"wrap"}}>
                              {t.strategy&&<span>{t.strategy}</span>}
                              {t.session&&<span>{t.session}</span>}
                              {t.rr>0&&<span>{t.rr}R</span>}
                              {t.emotion&&<span>{t.emotion}</span>}
                              {t.size>0&&<span>{t.size} lot{t.size>1?"s":""}</span>}
                            </div>
                            {t.notes&&<div style={{fontSize:11,color:"#a8aab4",marginTop:4,fontStyle:"italic"}}>{t.notes}</div>}
                          </div>
                        </div>
                    </div>
                  ))}
                  {(!calData.dayMap[calSelected]||calData.dayMap[calSelected].trades.length===0)&&(
                    <div style={{textAlign:"center",padding:"20px 0",color:"rgba(0,200,255,0.6)",fontSize:13}}>Aucun trade ce jour.</div>
                  )}
                </div>
              </div>
            )}
          </div>
        )}

        {/* ── FIN DES VUES (version publique) ── */}

      </div>

      {/* Lightbox */}
      {lightbox&&(
        <div onClick={()=>setLightbox(null)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,.93)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center",cursor:"zoom-out",padding:32}}>
          <img src={lightbox} alt="" style={{maxWidth:"100%",maxHeight:"90vh",borderRadius:12,border:"1px solid #333"}}/>
          <div style={{position:"absolute",top:20,right:24,color:"#a8aab4",fontSize:28,cursor:"pointer"}}>✕</div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
